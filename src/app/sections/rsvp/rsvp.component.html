<section class="bg-gradient-to-b from-sand via-accent to-coffee px-6 py-20 text-ivory">
  <div class="max-w-md mx-auto text-center">
    <p class="uppercase tracking-[0.35em] text-xs text-cream mb-3" [appReveal]="0">Confirmación</p>
    <h2 class="font-serif text-4xl md:text-5xl mb-10 text-ivory" [appReveal]="120">Asistencia</h2>

    <p class="font-serif font-semibold text-base leading-relaxed mb-10 text-ivory" [appReveal]="340">
      Por favor confirma tu asistencia antes del
      <span class="text-cream">07 de agosto</span>.
    </p>

    <div class="border border-cream/40 px-6 py-5 mb-10 inline-flex flex-col items-center bg-ivory/5" [appReveal]="460" revealVariant="zoom">
      <p class="uppercase tracking-[0.3em] text-[10px] text-cream mb-1">Pases reservados</p>
      <p class="font-serif text-2xl text-ivory">{{ passesLabel }}</p>
    </div>

    <div [appReveal]="600" revealVariant="zoom">
      <a
        [href]="whatsappLink"
        target="_blank"
        rel="noopener"
        class="inline-flex items-center justify-center gap-3 bg-cream text-mocha px-10 py-4 uppercase tracking-[0.3em] text-xs hover:bg-ivory transition-all duration-300 hover:-translate-y-0.5 hover:shadow-lg">
        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
          <path d="M20.52 3.48A11.83 11.83 0 0012.04 0C5.5 0 .2 5.3.2 11.84a11.74 11.74 0 001.6 5.93L0 24l6.41-1.68a11.83 11.83 0 005.62 1.43h.01c6.54 0 11.84-5.3 11.84-11.84 0-3.16-1.23-6.13-3.36-8.43zM12.04 21.5h-.01a9.65 9.65 0 01-4.92-1.35l-.35-.21-3.8 1 1.01-3.7-.23-.38a9.62 9.62 0 01-1.48-5.13c0-5.32 4.33-9.65 9.66-9.65 2.58 0 5 1 6.82 2.83a9.6 9.6 0 012.83 6.83c0 5.32-4.33 9.66-9.65 9.66zm5.55-7.22c-.3-.15-1.79-.88-2.07-.98-.28-.1-.48-.15-.69.15-.2.3-.78.98-.96 1.18-.18.2-.36.22-.66.07-.3-.15-1.27-.47-2.42-1.5-.89-.8-1.5-1.78-1.67-2.08-.18-.3-.02-.46.13-.61.13-.13.3-.36.45-.54.15-.18.2-.3.3-.5.1-.2.05-.38-.02-.54-.07-.15-.69-1.66-.94-2.27-.25-.6-.5-.52-.7-.53l-.6-.01c-.2 0-.54.07-.82.36-.28.3-1.07 1.05-1.07 2.56s1.1 2.97 1.25 3.18c.15.2 2.15 3.3 5.22 4.62.73.31 1.3.5 1.74.64.73.23 1.4.2 1.92.12.59-.09 1.79-.73 2.05-1.43.26-.7.26-1.31.18-1.43-.08-.12-.27-.2-.57-.34z"/>
        </svg>
        Confirmar
      </a>
    </div>

    <p class="mt-20 font-script text-5xl md:text-6xl text-cream" [appReveal]="0">
      Te esperamos
    </p>
    <p class="mt-4 uppercase tracking-[0.4em] text-base font-serif text-ivory" [appReveal]="150">
      Larizza &amp; Alonso
    </p>

    <div class="mt-8 flex items-center justify-center gap-4" [appReveal]="300">
      <span class="h-[1px] w-12 bg-cream/60"></span>
      <p class="uppercase tracking-[0.4em] text-xl font-serif text-cream">07 . 11 . 2026</p>
      <span class="h-[1px] w-12 bg-cream/60"></span>
    </div>
  </div>
</section>
