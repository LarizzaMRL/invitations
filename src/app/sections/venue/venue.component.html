<section class="bg-gradient-to-b from-sand to-sand px-6 py-20 text-ink">
  <div class="max-w-md mx-auto text-center">
    <p class="uppercase tracking-[0.35em] text-xs text-accent mb-3" [appReveal]="0">Recepción</p>
    <h2 class="font-serif text-4xl md:text-5xl mb-10 text-mocha" [appReveal]="120">Salón Glück</h2>

    <p class="font-serif text-lg leading-relaxed mb-2 text-mocha" [appReveal]="320">
      Esperamos contar con su presencia en la recepción que se llevará a cabo a partir de las
      <span class="font-medium">18:00 hrs</span>.
    </p>

    <p class="font-serif text-base leading-relaxed mb-8 text-ink/75" [appReveal]="440">
      Ciprés 585, Col. Mactumatza,<br>
      Tuxtla Gutiérrez, Chiapas.
    </p>

    <a
      href="https://maps.google.com/?q=Salón+Glück+Ciprés+585+Mactumatza+Tuxtla+Gutiérrez+Chiapas"
      target="_blank"
      rel="noopener"
      [appReveal]="560"
      revealVariant="zoom"
      class="inline-flex items-center gap-2 border border-mocha text-mocha px-6 py-3 uppercase tracking-[0.25em] text-xs hover:bg-mocha hover:text-ivory transition-all duration-300 hover:-translate-y-0.5 hover:shadow-md">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 21s-7-7.5-7-12a7 7 0 1114 0c0 4.5-7 12-7 12z"/>
        <circle cx="12" cy="9" r="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Ver mapa
    </a>
  </div>
</section>
