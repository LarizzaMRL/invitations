<section class="bg-gradient-to-b from-sand to-cream px-6 py-20 text-ink">
  <div class="max-w-md mx-auto text-center">
    <h2 class="font-serif text-4xl md:text-5xl leading-tight mb-6 text-mocha" [appReveal]="0">
      Código de<br>vestimenta
    </h2>

    <p class="uppercase tracking-[0.45em] text-sm md:text-base font-serif mb-12 text-accent" [appReveal]="200">Formal</p>

    <p class="uppercase tracking-[0.3em] text-xs text-accent mb-6" [appReveal]="420">Colores no permitidos</p>

    <div class="flex justify-center items-center gap-3 mb-6 flex-wrap">
      <span class="color-dot transition-transform duration-300 hover:scale-110" style="background:#FFFFFF; border:1px solid #d8d2c8;" [appReveal]="500" revealVariant="zoom"></span>
      <span class="color-dot transition-transform duration-300 hover:scale-110" style="background:#BFB3A0;" [appReveal]="580" revealVariant="zoom"></span>
      <span class="color-dot transition-transform duration-300 hover:scale-110" style="background:#A93923;" [appReveal]="660" revealVariant="zoom"></span>
      <span class="color-dot transition-transform duration-300 hover:scale-110" style="background:#B85535;" [appReveal]="740" revealVariant="zoom"></span>
      <span class="color-dot transition-transform duration-300 hover:scale-110" style="background:#D55A2C;" [appReveal]="820" revealVariant="zoom"></span>
      <span class="color-dot transition-transform duration-300 hover:scale-110" style="background:#E08552;" [appReveal]="900" revealVariant="zoom"></span>
    </div>

    <p class="uppercase tracking-[0.25em] text-sm text-mocha" [appReveal]="1000">
      Blanco · Beige · Tonos naranja
    </p>
  </div>
</section>
