<section class="bg-gradient-to-b from-cream to-sand px-6 py-24 text-ink">
  <div class="max-w-md mx-auto text-center">
    <p class="uppercase tracking-[0.35em] text-xs text-accent mb-3" [appReveal]="0">Tu presencia es nuestro mejor regalo</p>
    <h2 class="font-serif text-4xl md:text-5xl mb-10 text-mocha" [appReveal]="120">Mesa de regalos</h2>

    <p class="font-serif text-base text-ink/75 mb-10 leading-relaxed" [appReveal]="340">
      Si deseas obsequiarnos algo, te compartimos nuestras cuentas como sugerencia.
    </p>

    <!-- BBVA -->
    <div class="bg-ivory border border-accent/40 rounded-sm px-6 py-7 mb-6 text-left transition-shadow duration-300 hover:shadow-lg" [appReveal]="460" revealVariant="left">
      <p class="uppercase tracking-[0.3em] text-xs text-accent mb-4 text-center">Banco BBVA</p>

      <p class="uppercase tracking-[0.2em] text-[10px] text-ink/60">Titular</p>
      <p class="font-serif text-base mb-4 text-mocha">Luis Alonso Solano Urban</p>

      <p class="uppercase tracking-[0.2em] text-[10px] text-ink/60">CLABE</p>
      <p class="font-serif text-base tracking-wider mb-4 text-mocha">0121 8001 5999 1808 95</p>

      <button
        type="button"
        data-label="Copiar CLABE"
        (click)="copy('012180015999180895', $event)"
        class="w-full uppercase tracking-[0.25em] text-xs border border-mocha text-mocha py-3 hover:bg-mocha hover:text-ivory transition-all duration-300 hover:-translate-y-0.5">
        Copiar CLABE
      </button>
    </div>

    <!-- Nu -->
    <div class="bg-ivory border border-accent/40 rounded-sm px-6 py-7 text-left transition-shadow duration-300 hover:shadow-lg" [appReveal]="640" revealVariant="right">
      <p class="uppercase tracking-[0.3em] text-xs text-accent mb-4 text-center">Banco Nu</p>

      <p class="uppercase tracking-[0.2em] text-[10px] text-ink/60">Titular</p>
      <p class="font-serif text-base mb-4 text-mocha">Larizza Michel Rincón León</p>

      <p class="uppercase tracking-[0.2em] text-[10px] text-ink/60">CLABE</p>
      <p class="font-serif text-base tracking-wider mb-4 text-mocha">6381 8001 0148 4124 48</p>

      <button
        type="button"
        data-label="Copiar CLABE"
        (click)="copy('638180010148412748', $event)"
        class="w-full uppercase tracking-[0.25em] text-xs border border-mocha text-mocha py-3 hover:bg-mocha hover:text-ivory transition-all duration-300 hover:-translate-y-0.5">
        Copiar CLABE
      </button>
    </div>
  </div>
</section>
